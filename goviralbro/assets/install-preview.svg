<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 360" width="620" height="360">
  <defs>
    <style>
      .bg { fill: #1e1e2e; }
      .titlebar { fill: #313244; }
      .red { fill: #f38ba8; }
      .yellow { fill: #f9e2af; }
      .green { fill: #a6e3a1; }
      .text { fill: #cdd6f4; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 13px; }
      .dim { fill: #6c7086; }
      .white { fill: #cdd6f4; font-weight: bold; }
      .cyan { fill: #89dceb; }
      .green-text { fill: #a6e3a1; }
      .blue-text { fill: #89b4fa; }
      .title-text { fill: #bac2de; font-family: 'SF Mono', monospace; font-size: 12px; }
      .prompt { fill: #6c7086; }
      .logo { fill: #89b4fa; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Menlo', 'Consolas', monospace; font-size: 14px; }
    </style>
  </defs>

  <!-- Window -->
  <rect class="bg" width="620" height="360" rx="10"/>

  <!-- Title bar -->
  <rect class="titlebar" width="620" height="36" rx="10"/>
  <rect class="titlebar" y="20" width="620" height="16"/>

  <!-- Traffic lights -->
  <circle class="red" cx="20" cy="18" r="6"/>
  <circle class="yellow" cx="40" cy="18" r="6"/>
  <circle class="green" cx="60" cy="18" r="6"/>

  <!-- Title -->
  <text class="title-text" x="310" y="22" text-anchor="middle">Terminal</text>

  <!-- Terminal content -->
  <text class="prompt" x="20" y="65">~ $</text>
  <text class="text" x="52" y="65">bash scripts/init-viral-command.sh</text>

  <!-- GVB ASCII Logo (basic ASCII chars only — renders everywhere) -->
  <text class="logo" x="28" y="92" xml:space="preserve">   ______     ______</text>
  <text class="logo" x="28" y="108" xml:space="preserve">  / ___\ \   / / __ )</text>
  <text class="logo" x="28" y="124" xml:space="preserve"> | |  _ \ \ / /|  _ \</text>
  <text class="logo" x="28" y="140" xml:space="preserve"> | |_| | \ V / | |_) |</text>
  <text class="logo" x="28" y="156" xml:space="preserve">  \____|  \_/  |____/</text>

  <!-- Product name -->
  <text class="white" x="28" y="184" font-family="'SF Mono',monospace" font-size="14" font-weight="bold">Go Viral Bitch</text>
  <text class="dim" x="175" y="184" font-family="monospace" font-size="13">v0.1.0</text>
  <text class="dim" x="28" y="202" font-family="monospace" font-size="12">Trainable social media coaching system</text>
  <text class="dim" x="28" y="218" font-family="monospace" font-size="12">for Claude Code.</text>

  <!-- Status lines -->
  <text class="green-text" x="28" y="249" font-family="monospace" font-size="13">&#10003;</text>
  <text class="text" x="44" y="249" font-family="monospace" font-size="13">Directories ready</text>

  <text class="green-text" x="28" y="267" font-family="monospace" font-size="13">&#10003;</text>
  <text class="text" x="44" y="267" font-family="monospace" font-size="13">Data files initialized</text>

  <text class="green-text" x="28" y="285" font-family="monospace" font-size="13">&#10003;</text>
  <text class="text" x="44" y="285" font-family="monospace" font-size="13">Python dependencies installed</text>

  <text class="green-text" x="28" y="303" font-family="monospace" font-size="13">&#10003;</text>
  <text class="text" x="44" y="303" font-family="monospace" font-size="13">Installed Viral Command</text>

  <!-- Done line -->
  <text class="green-text" x="28" y="330" font-family="monospace" font-size="13" font-weight="bold">Done!</text>
  <text class="text" x="70" y="330" font-family="monospace" font-size="13">Run</text>
  <text class="cyan" x="100" y="330" font-family="monospace" font-size="13">/viral:setup</text>
  <text class="text" x="203" y="330" font-family="monospace" font-size="13">to get started.</text>

  <!-- Cursor -->
  <text class="prompt" x="28" y="352">~ $</text>
  <rect fill="#cdd6f4" x="60" y="341" width="8" height="14" opacity="0.7"/>
</svg>